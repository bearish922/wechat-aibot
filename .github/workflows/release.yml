name: Release
on:
  push:
    tags: ["v*"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm test
        working-directory: app
      - run: npm run check
        working-directory: app
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release archive
        run: |
          mkdir wechat-aibot
          cp -r app/ scripts/ docs/ README.md launch.bat wechat-profiles.json wechat-memory.example.json wechat-aibot/
          rm -rf wechat-aibot/app/node_modules wechat-aibot/app/__pycache__
          mkdir -p wechat-aibot/data/knowledge
          cp -r data/knowledge/* wechat-aibot/data/knowledge/
          mkdir -p wechat-aibot/data/runtime wechat-aibot/data/logs wechat-aibot/data/inbound_media wechat-aibot/data/rag_vector_store
          cp app/config.example.json wechat-aibot/data/config.example.json
          cp data/prompts.json wechat-aibot/data/prompts.json
          zip -r wechat-aibot-${{ github.ref_name }}.zip wechat-aibot/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wechat-aibot-${{ github.ref_name }}.zip
          generate_release_notes: true
